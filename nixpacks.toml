[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "python311Packages.virtualenv"]

[phases.install]
cmds = [
  "cd frontend && npm ci --legacy-peer-deps",
  "python -m venv /opt/venv && . /opt/venv/bin/activate && cd backend && pip install -r requirements.txt"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn server:app --host 0.0.0.0 --port ${PORT:-8000}"
